name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild packaged skill
        run: python3 tools/package_skill.py

      - name: Validate repository
        run: make validate

      - name: Check packaged artifact is committed
        run: git diff --exit-code -- oss-contribution-conductor.skill

      - name: Upload packaged skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: oss-contribution-conductor-skill
          path: oss-contribution-conductor.skill
